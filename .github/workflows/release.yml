name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    name: Build macOS DMG
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x Scripts/package-app.sh Scripts/package-dmg.sh
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            export SOLARLIGHT_VERSION="${GITHUB_REF_NAME#v}"
          fi
          Scripts/package-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SolarLight.dmg
          path: .build/SolarLight*.dmg

      - name: Attach DMG to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "SolarLight macOS release."
          gh release upload "$TAG_NAME" .build/SolarLight*.dmg --clobber
